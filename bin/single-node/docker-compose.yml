name: texera-single-node-release-1-0-0
services:
  # Part1: Specification of the storage services used by Texera
  # MinIO is an S3-compatible object storage used to store datasets and files.
  minio:
    image: minio/minio:RELEASE.2025-02-28T09-55-16Z
    container_name: texera-minio
    ports:
      - "9000:9000"
    env_file:
      - .env
    volumes:
      - minio_data:/data
    command: server --console-address ":9001" /data

  # PostgreSQL with PGroonga extension for full-text search.
  # Used by lakeFS and Texera's metadata storage.
  postgres:
    image: groonga/pgroonga:4.0.1-debian-15
    container_name: texera-postgres
    restart: always
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "texera", "-d", "texera_db"]
      interval: 10s
      retries: 5
      start_period: 5s
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # mount the sql files for initializing the postgres
      - ../../sql:/docker-entrypoint-initdb.d

  # lakeFS is the underlying storage of Texera's dataset service
  lakefs:
    image: treeverse/lakefs:1.51
    container_name: texera-lakefs
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started
    env_file:
      - .env
    environment:
      # This port also need to be changed if the port of MinIO service is changed
      - LAKEFS_BLOCKSTORE_S3_PRE_SIGNED_ENDPOINT=${TEXERA_HOST}:9000
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        lakefs setup --user-name "$LAKEFS_INSTALLATION_USER_NAME" --access-key-id "$LAKEFS_INSTALLATION_ACCESS_KEY_ID" --secret-access-key "$LAKEFS_INSTALLATION_SECRET_ACCESS_KEY" || true
        lakefs run &
        wait
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8000/api/v1/healthcheck"]
      interval: 10s
      timeout: 5s
      retries: 10

  # Part2: Specification of Texera's micro-services
  # FileService provides endpoints for Texera's dataset management
  file-service:
    image: bobbai2000/texera-file-service:agent-service
    container_name: texera-file-service
    restart: always
    depends_on:
      minio:
        condition: service_started
      lakefs:
        condition: service_healthy
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:9092/api/healthcheck"]
      interval: 5s
      timeout: 3s
      retries: 10

  # WorkflowCompilingService provides endpoints for sanity check and schema propagation while workflows are being edited
  workflow-compiling-service:
    image: bobbai2000/texera-workflow-compiling-service:agent-service
    container_name: texera-workflow-compiling-service
    restart: always
    depends_on:
      file-service:
        condition: service_started
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:9090/api/healthcheck"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ComputingUnitMaster provides endpoints for executing workflows and interactions during executions.
  computing-unit-master:
    # to enable R operators, change the image tag to single-node-release-1-0-0-R
    image: bobbai2000/texera-workflow-execution-coordinator:agent-service
    container_name: texera-computing-unit-master
    restart: always
    depends_on:
      workflow-compiling-service:
        condition: service_started
    env_file:
      - .env
    volumes:
      - workflow_result_data:/amber/user-resources
      - ./shared-data:/data
      - ./application.ini:/texera/amber/conf/application.ini:ro

  # TexeraWebApplication provides endpoints for hub resource management.
  texera-web-application:
    image: bobbai2000/texera-dashboard-service:agent-service
    container_name: texera-web-application
    restart: always
    depends_on:
      computing-unit-master:
        condition: service_started
      workflow-compiling-service:
        condition: service_healthy
      file-service:
        condition: service_healthy
    env_file:
      - .env
    volumes:
      - workflow_result_data:/amber/user-resources
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/api/healthcheck"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ComputingUnitManagingService provides endpoints for managing computing units.
  computing-unit-managing-service:
    image: bobbai2000/texera-workflow-computing-unit-managing-service:agent-service
    container_name: texera-computing-unit-managing-service
    restart: always
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8888/api/healthcheck"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ConfigService provides GUI configuration and feature flags to the frontend.
  config-service:
    image: bobbai2000/texera-config-service:agent-service
    container_name: texera-config-service
    restart: always
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:9094/api/config/gui"]
      interval: 5s
      timeout: 3s
      retries: 10

  # Part 2.5: AI Copilot / Agent services
  # LiteLLM provides a unified LLM gateway that proxies requests to various LLM providers.
  # Models are configured in litellm-config.yaml; API keys come from host environment.
  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    container_name: texera-litellm
    restart: always
    env_file:
      - .env
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
    volumes:
      - ./litellm-config.yaml:/app/config.yaml:ro
    command: ["--config", "/app/config.yaml", "--port", "4000"]
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:4000/health/liveliness')\""]
      interval: 10s
      timeout: 5s
      retries: 10

  # AgentService provides AI-powered workflow manipulation via LLM agents.
  agent-service:
    image: bobbai2000/texera-agent-service:agent-service
    container_name: texera-agent-service
    restart: always
    depends_on:
      texera-web-application:
        condition: service_healthy
      litellm:
        condition: service_started
    environment:
      - PORT=3001
      - API_ENDPOINT=http://texera-web-application:8080
      - OPERATOR_METADATA_ENDPOINT=http://texera-web-application:8080
      - MODELS_ENDPOINT=http://texera-nginx:8080
      - COMPILE_ENDPOINT=http://texera-workflow-compiling-service:9090
      - WS_ENDPOINT=ws://texera-computing-unit-master:8085
      - EXECUTION_ENDPOINT=http://texera-computing-unit-master:8085
      - DATASET_ENDPOINT=http://texera-file-service:9092
      - LLM_API_KEY=dummy

  # Part 3: reverse proxy service for Texera's micro services
  nginx:
    image: nginx:alpine
    container_name: texera-nginx
    depends_on:
      - workflow-compiling-service
      - file-service
      - texera-web-application
      - computing-unit-master
      - computing-unit-managing-service
      - config-service
      - litellm
      - agent-service
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "8080:8080"

networks:
  default:
    name: texera-single-node-release-1-0-0

# persistent volumes
volumes:
  minio_data:
  postgres_data:
  workflow_result_data: