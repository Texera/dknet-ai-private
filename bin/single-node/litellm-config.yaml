# LiteLLM model configuration for single-node deployment.
# Edit this file to add, remove, or modify available LLM models.
# API keys are read from environment variables defined in .env.
# See https://docs.litellm.ai/docs/proxy/configs for full configuration options.

litellm_settings:
  drop_params: true

model_list:
  # Anthropic models (requires ANTHROPIC_API_KEY in .env)
  - model_name: claude-haiku-4.5
    litellm_params:
      model: claude-haiku-4-5-20251001
      api_key: "os.environ/ANTHROPIC_API_KEY"
  - model_name: claude-sonnet-3.7
    litellm_params:
      model: claude-3-7-sonnet-20250219
      api_key: "os.environ/ANTHROPIC_API_KEY"
  - model_name: claude-sonnet-3.5
    litellm_params:
      model: claude-3-5-sonnet-20240620
      api_key: "os.environ/ANTHROPIC_API_KEY"
  - model_name: claude-sonnet-4
    litellm_params:
      model: claude-sonnet-4-20250514
      api_key: "os.environ/ANTHROPIC_API_KEY"
  - model_name: claude-sonnet-4-5
    litellm_params:
      model: claude-sonnet-4-5-20250929
      api_key: "os.environ/ANTHROPIC_API_KEY"

  # OpenAI models (requires OPENAI_API_KEY in .env)
  - model_name: gpt-5-mini
    litellm_params:
      model: gpt-5-mini-2025-08-07
      api_key: "os.environ/OPENAI_API_KEY"
  - model_name: gpt-4.1
    litellm_params:
      model: gpt-4.1
      api_key: "os.environ/OPENAI_API_KEY"
  - model_name: gpt-5.2
    litellm_params:
      model: gpt-5.2
      api_key: "os.environ/OPENAI_API_KEY"
  - model_name: gpt-4.1-mini
    litellm_params:
      model: gpt-4.1-mini
      api_key: "os.environ/OPENAI_API_KEY"
  - model_name: o4-mini
    litellm_params:
      model: o4-mini
      api_key: "os.environ/OPENAI_API_KEY"
  - model_name: o3
    litellm_params:
      model: o3
      api_key: "os.environ/OPENAI_API_KEY"

  # Google models (requires GEMINI_API_KEY in .env)
  - model_name: gemini-2.5-pro
    litellm_params:
      model: gemini/gemini-2.5-pro
      api_key: "os.environ/GEMINI_API_KEY"

  # Local models via Ollama (no API key needed, requires Ollama running on host)
  # Uncomment to enable:
  # - model_name: llama-local
  #   litellm_params:
  #     model: ollama/llama3.1:8b
  #     api_base: "http://host.docker.internal:11434"
