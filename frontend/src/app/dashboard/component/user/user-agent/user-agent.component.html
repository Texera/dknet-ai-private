<div class="section-container subsection-grid-container">
  <nz-card class="section-title">
    <h2 class="page-title">AI Agents</h2>
    <div class="button-group">
      <button
        nz-button
        class="refresh-btn"
        (click)="loadAgents()"
        [nzLoading]="isLoading"
        title="Refresh Agents">
        <i
          nz-icon
          nzType="reload"
          nzTheme="outline"></i>
        <span>Refresh</span>
      </button>
    </div>
  </nz-card>

  <div class="section-search-bar">
    <span class="agent-count">{{ agents.length }} agent(s)</span>
  </div>

  <div class="section-list-container">
    <nz-spin [nzSpinning]="isLoading">
      <nz-empty
        *ngIf="agents.length === 0 && !isLoading"
        nzNotFoundContent="No agents found"
        [nzNotFoundFooter]="emptyFooter">
        <ng-template #emptyFooter>
          <p class="empty-hint">Agents are created when you start an AI assistant in a workflow.</p>
        </ng-template>
      </nz-empty>

      <nz-list
        *ngIf="agents.length > 0"
        [nzDataSource]="agents"
        [nzRenderItem]="agentItem"
        [nzItemLayout]="'horizontal'">
        <ng-template
          #agentItem
          let-agent>
          <nz-list-item
            class="agent-list-item"
            (click)="openAgent(agent)"
            [nzActions]="[deleteAction]">
            <ng-template #deleteAction>
              <button
                nz-button
                nzType="text"
                nzDanger
                nz-tooltip
                nzTooltipTitle="Delete agent"
                (click)="deleteAgent(agent, $event)">
                <i
                  nz-icon
                  nzType="delete"
                  nzTheme="outline"></i>
              </button>
            </ng-template>

            <nz-list-item-meta
              [nzTitle]="agentTitle"
              [nzDescription]="agentDescription"
              [nzAvatar]="agentAvatar">
              <ng-template #agentAvatar>
                <nz-avatar
                  [nzIcon]="'robot'"
                  nzSize="large"
                  [ngStyle]="{ 'background-color': '#1890ff' }">
                </nz-avatar>
              </ng-template>

              <ng-template #agentTitle>
                <div class="agent-title-row">
                  <span class="agent-name">{{ agent.name }}</span>
                  <nz-tag [nzColor]="getStateColor(agent)">{{ getStateText(agent) }}</nz-tag>
                </div>
              </ng-template>

              <ng-template #agentDescription>
                <div class="agent-meta">
                  <span class="agent-model">
                    <i
                      nz-icon
                      nzType="api"
                      nzTheme="outline"></i>
                    {{ agent.modelType }}
                  </span>
                  <span
                    class="agent-workflow"
                    *ngIf="agent.delegate?.workflowName">
                    <i
                      nz-icon
                      nzType="project"
                      nzTheme="outline"></i>
                    {{ agent.delegate?.workflowName }}
                  </span>
                  <span
                    class="agent-workflow"
                    *ngIf="agent.delegate?.workflowId && !agent.delegate?.workflowName">
                    <i
                      nz-icon
                      nzType="project"
                      nzTheme="outline"></i>
                    Workflow #{{ agent.delegate?.workflowId }}
                  </span>
                  <span class="agent-created">
                    <i
                      nz-icon
                      nzType="clock-circle"
                      nzTheme="outline"></i>
                    {{ formatDate(agent.createdAt) }}
                  </span>
                </div>
              </ng-template>
            </nz-list-item-meta>
          </nz-list-item>
        </ng-template>
      </nz-list>
    </nz-spin>
  </div>
</div>
